<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset='utf-8'>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel = "stylesheet" href="style.css">
        <script src="https://code.jquery.com/jquery-3.1.0.min.js"></script>
    </head>
    <body>

    <div class="full_website">
        <header>            
   

        <div class="Top_Section">
        <h1> Group Project </h1>
        <p> IT 4403 - Advanced Web and Mobile Applications </p>
        </div>

        <nav>
        <a href="index.html"> SEARCH </a>
        <a href="favorites.html">FAVORITES</a>
        <a href="XXX.html"> </a>
        </nav>

   
        </header>


        <div class = "Content_container">
            
            <div class = "main_content_container">
                <div class = "content_area" id = "movie_search">
                    <input id="user_search" type="text" placeholder="Search for a movie or (possibly genre?)">
                    <button id = "search_button">Search</button>
                </div>
                <div class = "content_area" id = "top_rated_movies">Top rated Movies</div>
                <div class = "content_area" id = "movie_collection">Collection of stored movies</div>
                <div class = "content_area" id = "search_by_genre">ability to look for movies by genre.</div>
            </div>
        </div>
    </body>
    </div>
</html>

<script> 

user_input = ""
api_key = "e385f2f999e5722091095f17147c4465" 

$('#search_button').click(function(){ // search button
    user_input=$('#user_search').val()
    result_number()
})

function result_number(){
    $("#movie_collection").html("")

    ex_url="https://api.themoviedb.org/3/search/movie?api_key=e385f2f999e5722091095f17147c4465&query=batman" //For reference

    url = "https://api.themoviedb.org/3/search/movie?api_key=" + api_key + "&query=" + user_input


    $.get(url, function(json_movies){
        for (i=0; i<json_movies.results.length; i++){

        title = json_movies.results[i].title
        id = json_movies.results[i].id
        overview = json_movies.results[i].overview
        rating = json_movies.results[i].vote_average
        date = json_movies.results[i].release_date
        thumbnail = "https://image.tmdb.org/t/p/w500" + json_movies.results[i].poster_path //Need to fix


        $("#movie_collection").append(`
            <div class="Movie_Background">
                    <img src="${thumbnail}" class="Img">
                    <div class="Movie_Info">
                        
                        <h3 class="click" data-id="${id}" style="cursor:pointer"> 
                            ${title}
                        </h3>

                        <p><b>Overview:</b> ${overview}</p>
                        <p><b>Date:</b> ${date}</p>
                        <p><b>Rating:</b> ${rating}</p>

                        <div class="preview">
                            <a href="https://themoviedb.org/movie/${id}" target="_blank">Preview Movie</a>
                        </div>

                    </div>
                </div>
        
`) 
        }
})
}
    
</script>


<style> 

body{
    background-color: bisque;
}

header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.full_website {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

#search_button{
    padding: 5px 20px;
    background-color: black;
    color: white;
    border-radius: 20px;
}

    padding:10px 30px;
    width: 300px;
    margin-top: 50px;

}

nav a {
    text-decoration: none;
    background-color: black;
    color:white;
    border-radius: 5px;
    padding: 10px 20px;
    margin-left: 10px;

}

    text-align: center;
}

#movie_collection{

    display: grid;

    text-align: center;

}

.Movie_Background {
    background-color: white;

}

    padding: 5px 5px;

}
