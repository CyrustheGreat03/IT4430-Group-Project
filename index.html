<script> 
user_input = ""
api_key = "e385f2f999e5722091095f17147c4465" 

$('#search_button').click(function(){ // search button
    user_input=$('#user_search').val()
    result_number()
})

//SEARCH RESULTS

function result_number(){
    $("#movie_collection").html("")

    ex_url="https://api.themoviedb.org/3/search/movie?api_key=e385f2f999e5722091095f17147c4465&query=batman" //For reference

    url = "https://api.themoviedb.org/3/search/movie?api_key=" + api_key + "&query=" + user_input


    $.get(url, function(json_movies){
    
        for (i=0; i<json_movies.results.length; i++){

        title = json_movies.results[i].title
        id = json_movies.results[i].id
        overview = json_movies.results[i].overview
        rating = json_movies.results[i].vote_average
        date = json_movies.results[i].release_date
        thumbnail = "https://image.tmdb.org/t/p/w500" + json_movies.results[i].poster_path //Need to fix


        $("#movie_collection").append(`
            <div class="Movie_Background">
                    <img src="${thumbnail}" class="Img">
                    <div class="Movie_Info">
                        
                        <h3 class="click" data-id="${id}" style="cursor:pointer"> 
                            ${title}
                        </h3>

                        <p><b>Overview:</b> ${overview}</p>
                        <p><b>Date:</b> ${date}</p>
                        <p><b>Rating:</b> ${rating}</p>

                        <div class="preview">
                            <a href="https://themoviedb.org/movie/${id}" target="_blank">Preview Movie</a>
                        </div>

                    </div>
                </div>
        
`) 
        }
})
}

//DETAILS WHEN CLICKING ON TITLE... IN PROGRESS (GENRE, CAST ISSUES)

$(document).on("click", ".click", function(){
    id=$(this).data("id")
    url = "https://api.themoviedb.org/3/movie/" + id + "?api_key=" + api_key 
   
    $.getJSON(url, function(json_movie){


        title=json_movie.title
        rating=json_movie.vote_average
        date=json_movie.release_date
        genres=json_movie.genres //Why is genre breaking?
        //cast: ... 
        language=json_movie.original_language
        thumbnail="https://image.tmdb.org/t/p/w500" + json_movie.poster_path


        document.getElementById("movie_details").scrollIntoView()

        $("#movie_details").html(`

            <div class="Movie_Background">
                <img src="${thumbnail}" class="Img">
                <div class="Movie_Info">
                    <h2>${title}</h2>
                    <p><b>Rating:</b> ${rating}</p>
                    <p><b>Date:</b> ${date}</p>
                    <p><b>Genres:</b> ${genres}</p>
                    
                    <p><b>Langauge:</b> ${language}</p>
                    <button id="favorite"> Add to Favorites </button>
                </div>
            </div>

        
        `)
                })
            })

//COLLECTION of POPULAR CONTENT 

url_popular = "https://api.themoviedb.org/3/movie/popular?api_key=e385f2f999e5722091095f17147c4465"


$.getJSON(url_popular, function(Popular_Content){

    for (i=0; i<Popular_Content.results.length; i++){

        title=Popular_Content.results[i].title
        id=Popular_Content.results[i].id
        rating=Popular_Content.results[i].vote_average
        date=Popular_Content.results[i].release_date
        language=Popular_Content.results[i].original_language
        thumbnail="https://image.tmdb.org/t/p/w500" + Popular_Content.results[i].poster_path


    $("#top_rated_movies").append(`

        <div class="Movie_Background">
                <img src="${thumbnail}" class="Img">
                <div class="Movie_Info">
                    <h3 class="click" data-id="${id}" style="cursor:pointer"> 
                         ${title} 
                     </h3>
                    <p><b>Rating:</b> ${rating}</p>
                    <p><b>Date:</b> ${date}</p>
                    <p><b>Langauge:</b> ${language}</p>
                    <button id="favorite-btn" data-id="${id}"> Add to Favorites </button>

    `)

                }


})
                                                                                            // ensuring favorites exists in local storage
    if(!localStorage.getItem("favorites")){                                                 // checks to see if favorites exists
        // if it does not then make it.
        localStorage.setItem("favorites", JSON.stringify([])); //CITE: https://www.w3schools.com/jsref/prop_win_localstorage.asp
    }
 /* Add Item to the favorites list*/   
function addFavorite(fave_id){                                                               // function for adding favorites to local storage
    let movie_id = fave_id;    
    let favorites = JSON.parse(localStorage.getItem("favorites"));                           // retrieve favorites list from local storage

    if (!favorites.includes(movie_id)){                                                      // checks to see if the movie is already in the list
        favorites.push(movie_id);                                                            // pushes the movie into the list
        localStorage.setItem("favorites", JSON.stringify(favorites));                        // converts the list back to a string with the new item a part of it and sends it to local storage.
    }
}
/* Remove Item from favorites list */
function removeFavorite(bad_id){ 
    let bad_id = Number(bad_id);                                                              // Overwrites the parameter bad ID
    let favorites = getFavorites();
    let new_favorites = favorites.filter(id=> id != bad_id);                                  // filters the list and saves it under a new varname
    localStorage.setItem("favorites", JSON.stringify(new_favorites));                         // saves the new updated list in local storage
}
/*Get the Favorites list*/
function getFavorites(){return JSON.parse(localStorage.getItem("favorites"));}                 // returns the list of favorite IDs
function isFavorite(m_id){
    let favorites = getFavorites();                                                             // favorites list scope = function
    return favorites.includes(Number(m_id));                                                    // returns whether or not the movie is in the favorites list
}
    
$("#favorite-btn").on("click",function(){
    let fave_id = Number($(this).data("id"));                                                   // retrieves the movie ID

    if (isFavorite(fave_id)){                                                                    // check if the movie is in favorites list
        removeFavorite(fave_id);                                                                 // remove it and change text to remove from favorites
        $(this).text("Add to Favorites");                                                        // Change text to add
    } else{
        addFavorite(fave_id);                                                                    // else add it to favorites
        $(this).text("Remove From Favorites");                                                   // Change text to remove
    }
});

</script>
